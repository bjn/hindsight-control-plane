name: Build and deploy Hindsight Explorer

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
      - package.json
      - server.js
      - server.test.js
      - public/**
      - .github/workflows/build-image.yml
      - .github/scripts/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/bjn/hindsight-control-plane
  COOLIFY_API_URL: https://app.coolify.io/api/v1
  COOLIFY_APPLICATION_UUID: e14gngz0zq8a3lqa9wm7ev0r

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate app
        run: |
          npm test
          npm run check
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trigger Coolify deploy
        if: github.ref == 'refs/heads/main'
        env:
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
        run: |
          test -n "$COOLIFY_API_KEY"
          ./.github/scripts/coolify-deploy-and-wait.sh "$COOLIFY_APPLICATION_UUID" false

  notify-result:
    name: Notify ntfy on workflow result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - build-and-push
    if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Publish result notification
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_USER: ${{ secrets.NTFY_USER }}
          NTFY_PASSWORD: ${{ secrets.NTFY_PASSWORD }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          test -n "$NTFY_URL"
          test -n "$NTFY_TOPIC"
          test -n "$NTFY_USER"
          test -n "$NTFY_PASSWORD"
          SHORT_SHA="${SHA:0:7}"

          if printf '%s' "$NEEDS_JSON" | grep -q '"result"[[:space:]]*:[[:space:]]*"failure"'; then
            STATE="failed"
            TITLE="Coolify deploy failed: ${REPOSITORY}"
            PRIORITY="high"
            TAGS="warning,rocket"
          elif printf '%s' "$NEEDS_JSON" | grep -q '"result"[[:space:]]*:[[:space:]]*"cancelled"'; then
            STATE="cancelled"
            TITLE="Coolify deploy cancelled: ${REPOSITORY}"
            PRIORITY="high"
            TAGS="warning,rocket"
          else
            STATE="succeeded"
            TITLE="Coolify deploy succeeded: ${REPOSITORY}"
            PRIORITY="low"
            TAGS="white_check_mark,rocket"
          fi

          MESSAGE="$(printf '%s\n%s' "Coolify deploy ${STATE}: ${WORKFLOW_NAME} on ${REF_NAME} (${SHORT_SHA})" "${RUN_URL}")"
          curl --fail --show-error --silent \
            -u "$NTFY_USER:$NTFY_PASSWORD" \
            -H "Title: ${TITLE}" \
            -H "Priority: ${PRIORITY}" \
            -H "Tags: ${TAGS}" \
            -H "Click: ${RUN_URL}" \
            --data-binary "$MESSAGE" \
            "$NTFY_URL/$NTFY_TOPIC"
