services:
  hindsight-control-plane:
    image: ghcr.io/bjn/hindsight-control-plane:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: 9999
      HOSTNAME: 0.0.0.0
      HINDSIGHT_CP_DATAPLANE_API_URL: http://hindsight-memory:8888
    labels:
      traefik.enable: "true"
      traefik.http.middlewares.gzip.compress: "true"
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
      traefik.http.middlewares.hindsight-control-plane-auth.forwardauth.address: http://authentik-server-s440g4cwsc444gk4k4goc4s4:9000/outpost.goauthentik.io/auth/traefik
      traefik.http.middlewares.hindsight-control-plane-auth.forwardauth.trustForwardHeader: "true"
      traefik.http.middlewares.hindsight-control-plane-auth.forwardauth.authResponseHeaders: X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version
      traefik.http.routers.hindsight-control-plane-http.rule: Host(`hindsight.crankingoutcode.com`)
      traefik.http.routers.hindsight-control-plane-http.entrypoints: http
      traefik.http.routers.hindsight-control-plane-http.middlewares: redirect-to-https
      traefik.http.routers.hindsight-control-plane-https.rule: Host(`hindsight.crankingoutcode.com`)
      traefik.http.routers.hindsight-control-plane-https.entrypoints: https
      traefik.http.routers.hindsight-control-plane-https.middlewares: gzip,hindsight-control-plane-auth
      traefik.http.routers.hindsight-control-plane-https.tls: "true"
      traefik.http.routers.hindsight-control-plane-https.tls.certresolver: letsencrypt
      traefik.http.services.hindsight-control-plane.loadbalancer.server.port: 9999
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9999/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      coolify: null

networks:
  coolify:
    external: true
