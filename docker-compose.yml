services:
  hindsight-control-plane:
    image: ghcr.io/bjn/hindsight-control-plane:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      PORT: 9999
      HOSTNAME: 0.0.0.0
      HINDSIGHT_API_URL: http://hindsight-memory:8888
    labels:
      traefik.enable: "false"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      default: null
      coolify:
        aliases:
          - hindsight-explorer
      hermes-webui: null

networks:
  coolify:
    external: true
  hermes-webui:
    external: true
    name: qqm82xixjk7y8k4qg57tbtb3
